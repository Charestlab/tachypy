name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - codex-api-modernization-hardening

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package + lint deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Ruff
        run: ruff check src tests

  tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    env:
      TACHYPY_AUDIO_BACKEND: dummy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run tests with coverage
        run: pytest --cov=tachypy --cov-report=term-missing --cov-fail-under=80
