name: CI

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main
      - "dev_*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package + lint deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Ruff
        run: ruff check src tests

  docs:
    name: docs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt
          pip install -e .

      - name: Build docs
        run: sphinx-build -b html docs docs/_build/html

  tests:
    name: tests (${{ matrix.os }}, ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    env:
      TACHYPY_AUDIO_BACKEND: dummy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
          python -m pip check

      - name: Import smoke test
        run: python -c "import tachypy; from tachypy import ResponseHandler; ResponseHandler()"

      - name: Run tests with coverage
        run: pytest --cov=tachypy --cov-report=term-missing --cov-fail-under=80
